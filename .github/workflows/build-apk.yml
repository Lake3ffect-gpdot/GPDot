name: Build Standing GPDot APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-id: '20'
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Initialize Capacitor Android Project
        run: |
          npx cap init "F1 Dot Racer" com.offline.f1dotracer --web-dir=www --confirm
          npx cap add android

      - name: Copy and Sync Web Assets
        run: |
          npx cap sync android

      - name: Build Android APK (Debug Mode)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: f1-dot-racer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
